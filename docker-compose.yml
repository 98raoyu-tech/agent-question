# =============================================================================
# 企业级 AI 工作流操作系统 - Docker Compose 编排
# 包含所有基础设施服务及应用服务
# 使用方式：docker compose up -d
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL + pgvector 向量数据库
  # 端口：5432
  # 用途：主业务数据存储 + 向量检索（Embedding 存储与相似度查询）
  # ---------------------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ai-workflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_workflow_os
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Redis 缓存与消息队列
  # 端口：6379
  # 用途：会话缓存、分布式锁、限流计数器、Pub/Sub 消息
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: ai-workflow-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Neo4j 图数据库
  # 端口：7474 (Web UI) / 7687 (Bolt 协议)
  # 用途：Agent 关系图谱、工作流 DAG、知识图谱
  # ---------------------------------------------------------------------------
  neo4j:
    image: neo4j:5-community
    container_name: ai-workflow-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/neo4j_password
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p neo4j_password 'RETURN 1'"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ---------------------------------------------------------------------------
  # Zookeeper - Kafka 依赖的协调服务
  # 端口：2181
  # ---------------------------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: ai-workflow-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log

  # ---------------------------------------------------------------------------
  # Kafka 消息队列
  # 端口：9092 (外部) / 29092 (内部)
  # 用途：事件总线、异步任务分发、Agent 间通信、审计日志流
  # ---------------------------------------------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: ai-workflow-kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_started
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ---------------------------------------------------------------------------
  # Temporal Server - 工作流引擎
  # 端口：7233 (gRPC) / 8233 (Web UI)
  # 用途：持久化工作流编排、任务调度、重试与超时管理
  # ---------------------------------------------------------------------------
  temporal:
    image: temporalio/auto-setup:1.25.0
    container_name: ai-workflow-temporal
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB: postgresql
      DB_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PWD: postgres
      POSTGRES_SEEDS: postgres
      DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/development-sql.yaml
    ports:
      - "7233:7233"
      - "8233:8080"
    volumes:
      - temporal_data:/etc/temporal

  # ---------------------------------------------------------------------------
  # Temporal Admin Tools - 管理工具
  # 用途：命名空间管理、工作流查询、任务队列管理等运维操作
  # ---------------------------------------------------------------------------
  temporal-admin-tools:
    image: temporalio/admin-tools:1.25.0
    container_name: ai-workflow-temporal-admin
    depends_on:
      temporal:
        condition: service_started
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CLI_ADDRESS: temporal:7233
    stdin_open: true
    tty: true

  # ---------------------------------------------------------------------------
  # 应用服务 - Enterprise AI Workflow OS
  # 端口：8000
  # 说明：首次运行前请先执行 docker compose build 构建镜像
  # ---------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: ai-workflow-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8000:8080"
    env_file:
      - .env
    volumes:
      - ./src:/app/src
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

# =============================================================================
# 持久化数据卷
# =============================================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  neo4j_data:
    driver: local
  zookeeper_data:
    driver: local
  zookeeper_log:
    driver: local
  kafka_data:
    driver: local
  temporal_data:
    driver: local
